<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" width="640" height="640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="55%" stop-color="#b14bff"/>
      <stop offset="100%" stop-color="#ff5c8a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <!-- background circle -->
  <rect width="640" height="640" fill="url(#bg)"/>
  <rect width="640" height="640" fill="url(#glow)"/>

  <!-- confetti -->
  <g filter="url(#soft)">
    <rect x="90"  y="110" width="22" height="10" rx="3" fill="#ffd84d" transform="rotate(-22 101 115)"/>
    <rect x="520" y="140" width="18" height="8"  rx="2" fill="#4dd0ff" transform="rotate(34 529 144)"/>
    <rect x="100" y="500" width="20" height="9"  rx="2" fill="#4dffa6" transform="rotate(18 110 504)"/>
    <rect x="510" y="490" width="24" height="10" rx="3" fill="#ffd84d" transform="rotate(-40 522 495)"/>
    <circle cx="70"  cy="320" r="7"  fill="#4dffa6"/>
    <circle cx="575" cy="310" r="6"  fill="#ffffff"/>
    <circle cx="320" cy="60"  r="8"  fill="#4dd0ff"/>
    <circle cx="320" cy="585" r="7"  fill="#ffd84d"/>
    <path d="M150 200 q10 -12 22 0 q-10 12 -22 0z" fill="#ff5c8a"/>
    <path d="M480 220 q10 -12 22 0 q-10 12 -22 0z" fill="#4dd0ff"/>
    <path d="M150 460 q10 -12 22 0 q-10 12 -22 0z" fill="#ffffff"/>
    <path d="M460 450 q10 -12 22 0 q-10 12 -22 0z" fill="#4dffa6"/>
  </g>

  <!-- monogram PU -->
  <g fill="#ffffff" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-weight="800">
    <text x="320" y="395" text-anchor="middle" font-size="290" letter-spacing="-8">PU</text>
  </g>

  <!-- subtle sparkle accents -->
  <g fill="#ffffff" opacity="0.9">
    <path d="M225 165 l6 14 14 6 -14 6 -6 14 -6 -14 -14 -6 14 -6z"/>
    <path d="M450 470 l5 11 11 5 -11 5 -5 11 -5 -11 -11 -5 11 -5z" opacity="0.7"/>
  </g>
</svg>
